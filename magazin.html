<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazin | H-TIME</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-header: #4a4541;
            --light-bg: #f5f5f5;
            --peach-bg: #fcbf88;
            --footer-bg: #efe8e4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Mono', monospace; background-color: var(--light-bg); color: black; padding-top: 80px; display: flex; flex-direction: column; min-height: 100vh; }
        h1, h2, h3, .sync-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        /* --- Sidebar & Layout --- */
        .shop-container { display: flex; width: 100%; max-width: 1400px; margin: 40px auto; padding: 0 20px; flex-grow: 1; }
        .sidebar { width: 250px; flex-shrink: 0; padding-right: 20px; }
        .filter-section { margin-bottom: 40px; }
        .filter-section h4 { font-size: 0.75rem; color: #888; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        /* --- DUAL RANGE SLIDER STYLE --- */
        .range-slider-container {
            position: relative;
            width: 100%;
            height: 50px;
            margin-top: 10px;
        }
        .range-slider-container input[type="range"] {
            position: absolute;
            left: 0;
            width: 100%;
            pointer-events: none;
            -webkit-appearance: none;
            height: 5px;
            background: #ddd;
            border-radius: 5px;
            outline: none;
        }
        /* Stil pentru cercurile de control (thumbs) */
        .range-slider-container input[type="range"]::-webkit-slider-thumb {
            pointer-events: auto;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: black;
            cursor: pointer;
            border: 2px solid var(--peach-bg);
            z-index: 2;
        }
        .price-values {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 25px;
        }

        /* --- Produse Grid --- */
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; flex-grow: 1; }
        .product-card { background: white; padding: 20px; border-radius: 10px; text-align: center; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between;}
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        .add-to-cart-btn { background: black; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; margin-top: 15px; font-family: 'Space Mono'; text-transform: uppercase; font-size: 0.75rem; }
        .add-to-cart-btn:hover { background: var(--peach-bg); color: black; }

        /* Nav & Footer Simple */
        nav { background: var(--dark-header); color: white; padding: 15px 50px; display: flex; justify-content: space-between; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .cart-btn { border: 1px solid white; padding: 8px 20px; border-radius: 30px; text-decoration: none; color: white; }
        footer { background: var(--footer-bg); padding: 40px; margin-top: auto; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        select { width: 100%; padding: 10px; margin: 15px 0; font-family: 'Space Mono'; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" style="font-weight:bold; color:white; font-size:1.5rem; font-family:'Syncopate'">H-TIME</a>
        <a href="checkout.html" id="cart-nav-btn" class="cart-btn">Cart (0)</a>
    </nav>

    <div class="shop-container">
        <div class="sidebar">
            <div class="filter-section">
                <h4>Categorie</h4>
                <select id="cat-select" class="sort-select" onchange="updateFilters({cat: this.value})" style="width:100%; padding:8px;">
                    <option value="all">Toate categoriile</option>
                    <option value="ceasuri">Ceasuri</option>
                    <option value="inele">Inele</option>
                    <option value="bratari">Brățări</option>
                </select>
            </div>

            <div class="filter-section">
                <h4>Interval Preț</h4>
                <div class="range-slider-container">
                    <input type="range" id="min-price-slider" min="0" max="1000" value="0" oninput="controlMinSlider()">
                    <input type="range" id="max-price-slider" min="0" max="1000" value="1000" oninput="controlMaxSlider()">
                </div>
                <div class="price-values">
                    <span>Min: €<span id="min-price-display">0</span></span>
                    <span>Max: €<span id="max-price-display">1000</span></span>
                </div>
            </div>

            <div class="filter-section">
                <h4>Sortează</h4>
                <select onchange="updateFilters({sort: this.value})" style="width:100%; padding:8px;">
                    <option value="default">Implicit</option>
                    <option value="price-asc">Preț: Mic -> Mare</option>
                    <option value="price-desc">Preț: Mare -> Mic</option>
                </select>
            </div>
        </div>

        <div class="products-grid" id="products-container"></div>
    </div>

    <div id="variant-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-product-name" class="sync-font">Alege Varianta</h3>
            <select id="variant-dropdown"></select>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; cursor:pointer; border-radius:20px; border:none;">Anulează</button>
                <button onclick="processAddToCart()" style="flex:1; padding:10px; cursor:pointer; border-radius:20px; border:none; background:black; color:white;">Confirmă</button>
            </div>
        </div>
    </div>

    <script src="produse.js"></script>
    <script>
        let state = {
            category: 'all',
            sortType: 'default',
            minP: 0,
            maxP: 1000
        };

        let currentProductForModal = null;

        // --- Logica pentru Dual Slider ---
        const minSlider = document.getElementById('min-price-slider');
        const maxSlider = document.getElementById('max-price-slider');
        const minDisplay = document.getElementById('min-price-display');
        const maxDisplay = document.getElementById('max-price-display');

        function controlMinSlider() {
            if (parseInt(minSlider.value) > parseInt(maxSlider.value) - 50) {
                minSlider.value = parseInt(maxSlider.value) - 50;
            }
            minDisplay.innerText = minSlider.value;
            updateFilters({minP: minSlider.value});
        }

        function controlMaxSlider() {
            if (parseInt(maxSlider.value) < parseInt(minSlider.value) + 50) {
                maxSlider.value = parseInt(minSlider.value) + 50;
            }
            maxDisplay.innerText = maxSlider.value;
            updateFilters({maxP: maxSlider.value});
        }

        // --- Filtrare și Sortare ---
        function updateFilters(params) {
            if (params.cat) state.category = params.cat;
            if (params.sort) state.sortType = params.sort;
            if (params.minP !== undefined) state.minP = parseInt(params.minP);
            if (params.maxP !== undefined) state.maxP = parseInt(params.maxP);

            let filtered = produse.filter(p => {
                const matchCat = state.category === 'all' || p.categorie === state.category;
                const matchPrice = p.pret >= state.minP && p.pret <= state.maxP;
                return matchCat && matchPrice;
            });

            if (state.sortType === 'price-asc') filtered.sort((a,b) => a.pret - b.pret);
            if (state.sortType === 'price-desc') filtered.sort((a,b) => b.pret - a.pret);

            renderProducts(filtered);
        }

        function renderProducts(lista) {
            const container = document.getElementById('products-container');
            container.innerHTML = lista.length === 0 ? '<p style="grid-column: 1/-1; padding: 50px;">Niciun produs găsit în acest interval.</p>' : '';
            
            lista.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.imagine}" alt="${p.nume}">
                        <h3 style="font-size:0.8rem; margin:15px 0;">${p.nume}</h3>
                        <p style="font-weight:bold;">€${p.pret}</p>
                        <button class="add-to-cart-btn" onclick="handleAddToCart(${p.id})">Adaugă în coș</button>
                    </div>
                `;
            });
        }

        // --- Coș și Modal ---
        function handleAddToCart(productId) {
            const product = produse.find(p => p.id === productId);
            if (product.variante && product.variante.length > 0) {
                currentProductForModal = product;
                document.getElementById('modal-product-name').innerText = product.nume;
                const dropdown = document.getElementById('variant-dropdown');
                dropdown.innerHTML = product.variante.map(v => `<option value="${v}">${v}</option>`).join('');
                document.getElementById('variant-modal').style.display = 'flex';
            } else {
                executeAdd(product.nume, product.pret, "Standard");
            }
        }

        function closeModal() { document.getElementById('variant-modal').style.display = 'none'; }

        function processAddToCart() {
            executeAdd(currentProductForModal.nume, currentProductForModal.pret, document.getElementById('variant-dropdown').value);
            closeModal();
        }

        function executeAdd(name, price, variant) {
            let cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
            cart.push({ name, price, variant });
            localStorage.setItem('htimeCart', JSON.stringify(cart));
            updateCartCounter();
            alert(`Adăugat: ${name} (${variant})`);
        }

        function updateCartCounter() {
            let cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
            document.getElementById('cart-nav-btn').innerText = `Cart (${cart.length})`;
        }

        window.onload = () => {
            updateFilters({});
            updateCartCounter();
        };
    </script>
</body>
</html>
